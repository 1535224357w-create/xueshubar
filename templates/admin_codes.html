{% extends "base.html" %}
{% block title %}激活码管理{% endblock %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold mb-1">⊠ 激活码管理</h2>
    <p class="text-muted mb-0">生成和管理 VIP 激活码</p>
</div>

<div class="row g-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">生成激活码</h5>
                <form id="genForm">
                    <div class="mb-3">
                        <label class="form-label">套餐</label>
                        <select id="planSelect" class="form-select">
                            <option value="monthly">月卡 (30天)</option>
                            <option value="quarterly">季卡 (90天)</option>
                            <option value="yearly">年卡 (365天)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">数量</label>
                        <input type="number" id="countInput" class="form-control" value="5" min="1" max="50">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">生成激活码</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">生成的激活码</h5>
                <div id="codeList">
                    <p class="text-muted small">点击生成后会显示在这里</p>
                </div>
                <button id="copyBtn" class="btn btn-sm btn-outline-secondary mt-2" style="display:none;" onclick="copyCodes()">复制全部</button>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('genForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var plan = document.getElementById('planSelect').value;
    var count = document.getElementById('countInput').value;
    var list = document.getElementById('codeList');
    var copyBtn = document.getElementById('copyBtn');

    list.innerHTML = '<p class="text-muted">生成中...</p>';
    copyBtn.style.display = 'none';

    fetch('/api/admin/gen-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({plan: plan, count: parseInt(count)})
    }).then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.codes) {
            var html = '<div class="table-responsive"><table class="table table-sm">';
            html += '<thead><tr><th>激活码</th><th>套餐</th></tr></thead><tbody>';
            d.codes.forEach(function(c) {
                var planName = {monthly:'月卡', quarterly:'季卡', yearly:'年卡'}[plan] || plan;
                html += '<tr><td><code>' + c + '</code></td><td>' + planName + '</td></tr>';
            });
            html += '</tbody></table></div>';
            list.innerHTML = html;
            copyBtn.style.display = 'block';
            window._codes = d.codes;
        } else {
            list.innerHTML = '<p class="text-danger">' + (d.error || '生成失败') + '</p>';
        }
    }).catch(function() {
        list.innerHTML = '<p class="text-danger">网络错误</p>';
    });
});

function copyCodes() {
    if (!window._codes) return;
    var text = window._codes.join('\n');
    navigator.clipboard.writeText(text).then(function() {
        alert('已复制 ' + window._codes.length + ' 个激活码');
    });
}
</script>
{% endblock %}
