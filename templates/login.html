{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="card-body p-4">
            <h3 class="text-center mb-1 fw-bold">👋 欢迎回来</h3>
            <p class="text-center text-muted mb-4">登录继续你的学习</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control form-control-lg" required
                           placeholder="输入用户名">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control form-control-lg" required
                           placeholder="输入密码">
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">登录</button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
                还没有账号？<a href="{{ url_for('register') }}" class="fw-bold">立即注册</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
