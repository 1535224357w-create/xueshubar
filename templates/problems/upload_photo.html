{% extends "base.html" %}
{% block title %}拍照上传错题{% endblock %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold mb-1">◉ 拍照上传</h2>
    <p class="text-muted mb-0">拍照或选择图片，AI 自动识别题目</p>
</div>

<div class="row g-4">
    <!-- 左侧：拍照/选图 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-body text-center p-4">
                <!-- 图片预览 -->
                <div id="previewArea" class="mb-3" style="display: none;">
                    <img id="imagePreview" class="img-fluid rounded border" style="max-height: 300px;">
                    <div class="mt-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="resetUpload()">重新选择</button>
                    </div>
                </div>

                <!-- 上传区域 -->
                <div id="uploadArea">
                    <div class="border-2 rounded p-5" style="border: 2px dashed var(--border); background: #f8f9fc;">
                        <div class="display-4 mb-3">◎</div>
                        <h5 class="fw-bold">选择题目图片</h5>
                        <p class="text-muted small mb-3">支持 JPG / PNG 格式</p>
                        <div class="d-flex justify-content-center gap-2">
                            <label class="btn btn-primary btn-lg">
                                ◉ 拍照
                                <input type="file" id="cameraInput" accept="image/*" capture="environment"
                                       style="display: none;" onchange="handleFileSelect(event)">
                            </label>
                            <label class="btn btn-outline-primary btn-lg">
                                ⊓ 选图
                                <input type="file" id="fileInput" accept="image/*"
                                       style="display: none;" onchange="handleFileSelect(event)">
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 识别按钮 -->
                <div id="ocrBtnArea" style="display: none;" class="mt-3">
                    <button class="btn btn-accent btn-lg w-100" onclick="doOCR()" id="ocrBtn">
                        ⊙ 识别题目
                    </button>
                    <div id="ocrSpinner" style="display: none;" class="mt-3">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-1">AI 正在识别中，请稍候...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧：识别结果 + 预览 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">§ 识别结果</h5>
                <form method="POST" action="{{ url_for('upload_problem') }}">
                    <div class="mb-3">
                        <textarea name="content" id="ocrResult" class="form-control" rows="5"
                            placeholder="拍照识别后，结果会显示在这里。可修改后提交。"
                            style="font-family: 'Courier New', monospace; font-size: 0.95rem;"
                            oninput="updatePreview()"></textarea>
                    </div>

                    <!-- 识别结果预览 -->
                    <div id="previewBox" class="mb-3 p-3 bg-light rounded border"
                         style="display: none; min-height: 60px;">
                        <small class="text-muted">⊙ 识别到的题目：</small>
                        <div id="previewContent" class="mt-1 fs-5 fw-bold"></div>
                    </div>

                    <div id="ocrRawArea" style="display: none;" class="mb-2">
                        <small class="text-muted">原始识别：<span id="ocrRawText" class="text-secondary"></span></small>
                    </div>
                    <div id="engineInfo" style="display: none;" class="mb-2">
                        <small class="text-muted">使用引擎：<span id="engineBadge" class="badge bg-info"></span></small>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">○ 结果可修改，下方实时预览公式效果</small>
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" disabled>
                            ↑ 提交错题
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let selectedFile = null;

function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('imagePreview').src = e.target.result;
        document.getElementById('previewArea').style.display = 'block';
        document.getElementById('uploadArea').style.display = 'none';
        document.getElementById('ocrBtnArea').style.display = 'block';
        document.getElementById('ocrResult').value = '';
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('ocrRawArea').style.display = 'none';
        document.getElementById('engineInfo').style.display = 'none';
        document.getElementById('previewBox').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

function resetUpload() {
    selectedFile = null;
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('uploadArea').style.display = 'block';
    document.getElementById('ocrBtnArea').style.display = 'none';
    document.getElementById('ocrResult').value = '';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('ocrRawArea').style.display = 'none';
        document.getElementById('engineInfo').style.display = 'none';
    document.getElementById('previewBox').style.display = 'none';
    document.getElementById('fileInput').value = '';
    document.getElementById('cameraInput').value = '';
}

function doOCR() {
    if (!selectedFile) return;
    const btn = document.getElementById('ocrBtn');
    const spinner = document.getElementById('ocrSpinner');
    btn.disabled = true;
    spinner.style.display = 'block';
    const formData = new FormData();
    formData.append('image', selectedFile);
    fetch('/api/ocr', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert('识别失败：' + data.error);
        } else {
            document.getElementById('ocrResult').value = data.text;
            document.getElementById('submitBtn').disabled = false;
            updatePreview();
            if (data.raw_ocr) {
                document.getElementById('ocrRawText').textContent = data.raw_ocr;
                document.getElementById('ocrRawArea').style.display = 'block';
            }
            if (data.engine_used) {
                const engineNames = {
                    'baidu_general': '????',
                    'baidu_formula': '????',
                    'qwen_vl': 'Qwen-VL',
                    'zhipuai_glm4v': 'GLM-4V',
                    'pix2tex': 'LaTeX-OCR',
                };
                document.getElementById('engineBadge').textContent = engineNames[data.engine_used] || data.engine_used;
                document.getElementById('engineInfo').style.display = 'block';
            }
        }
    })
    .catch(err => { alert('请求失败：' + err.message); })
    .finally(() => {
        btn.disabled = false;
        spinner.style.display = 'none';
    });
}

function updatePreview() {
    const text = document.getElementById('ocrResult').value.trim();
    const box = document.getElementById('previewBox');
    const content = document.getElementById('previewContent');
    if (!text) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    content.textContent = text;
}
</script>
{% endblock %}
