{% extends "base.html" %}
{% block title %}刷题模式{% endblock %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold mb-1">⊛ 刷题模式</h2>
    <p class="text-muted mb-0">按知识点逐题练习，AI 实时判题</p>
</div>

<!-- 选择知识点 -->
<div id="setupArea" class="card mb-4">
    <div class="card-body">
        <h5 class="fw-bold mb-3">选择知识点</h5>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <select id="kpSelect" class="form-select">
                    <option value="">所有知识点</option>
                    {% for kp in knowledge_points %}
                    <option value="{{ kp.id }}">{{ kp.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <select id="diffSelect" class="form-select">
                    <option value="">全部难度</option>
                    <option value="1">★ 简单</option>
                    <option value="2">★★</option>
                    <option value="3">★★★ 中等</option>
                    <option value="4">★★★★</option>
                    <option value="5">★★★★★ 困难</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="countSelect" class="form-select">
                    <option value="5">5 题</option>
                    <option value="10" selected>10 题</option>
                    <option value="20">20 题</option>
                </select>
            </div>
        </div>
        <button class="btn btn-primary btn-lg w-100" onclick="startPractice()">开始刷题</button>
    </div>
</div>

<!-- 刷题区 -->
<div id="practiceArea" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span id="progressText" class="fw-bold"></span>
        <span id="scoreText" class="text-success fw-bold"></span>
    </div>

    <div class="card mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between mb-2">
                <span id="qKp" class="badge badge-kp"></span>
                <span id="qDiff" class="difficulty-stars"></span>
            </div>
            <div id="qContent" class="problem-content fs-5 mb-4"></div>

            <div class="mb-3">
                <label class="form-label fw-bold">你的答案</label>
                <textarea id="userAnswer" class="form-control" rows="3" placeholder="输入你的答案..."></textarea>
            </div>

            <button id="submitBtn" class="btn btn-primary w-100" onclick="submitAnswer()">提交答案</button>

            <div id="resultArea" style="display:none;" class="mt-4 p-3 rounded">
                <div id="resultFeedback" class="fw-bold mb-2"></div>
                <div id="resultAnalysis" class="small"></div>
            </div>

            <div id="actionArea" style="display:none;" class="mt-3 d-flex gap-2">
                <button class="btn btn-outline-primary flex-fill" onclick="nextQuestion()">下一题 →</button>
                <button class="btn btn-outline-success flex-fill" onclick="addToWrong()">加入错题本</button>
            </div>
        </div>
    </div>
</div>

<!-- 完成页面 -->
<div id="completeArea" style="display:none;" class="text-center py-5">
    <div class="display-1 mb-3">⊛</div>
    <h3 class="fw-bold">刷题完成！</h3>
    <p id="summaryText" class="text-muted"></p>
    <button class="btn btn-primary me-2" onclick="location.reload()">再来一组</button>
</div>

<script>
var problems = [], currentIdx = 0, correctCount = 0, currentProblem = null;

function startPractice() {
    var kp = document.getElementById('kpSelect').value;
    var diff = document.getElementById('diffSelect').value;
    var count = document.getElementById('countSelect').value;
    document.getElementById('setupArea').style.display = 'none';
    document.getElementById('practiceArea').style.display = 'block';

    var params = new URLSearchParams();
    if (kp) params.set('kp_id', kp);
    if (diff) params.set('difficulty', diff);
    params.set('limit', count);

    fetch('/api/practice/start?' + params.toString())
    .then(function(r){return r.json()})
    .then(function(d){
        problems = d.problems || [];
        currentIdx = 0;
        correctCount = 0;
        if (problems.length === 0) {
            document.getElementById('practiceArea').innerHTML = '<div class="alert alert-warning">暂无匹配题目</div>';
            return;
        }
        loadQuestion();
    });
}

function loadQuestion() {
    var p = problems[currentIdx];
    currentProblem = p;
    document.getElementById('progressText').textContent = '第 ' + (currentIdx+1) + '/' + problems.length + ' 题';
    document.getElementById('scoreText').textContent = '✓ ' + correctCount;
    document.getElementById('qKp').textContent = p.kp_name || '综合';
    document.getElementById('qDiff').textContent = '★'.repeat(p.difficulty) + '☆'.repeat(5-p.difficulty);
    document.getElementById('qContent').innerHTML = p.content;
    document.getElementById('userAnswer').value = '';
    document.getElementById('userAnswer').disabled = false;
    document.getElementById('submitBtn').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('actionArea').style.display = 'none';
    if (window.renderMathInElement) renderMathInElement(document.getElementById('qContent'), {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
}

function submitAnswer() {
    var answer = document.getElementById('userAnswer').value.trim();
    if (!answer) { alert('请输入答案'); return; }
    document.getElementById('userAnswer').disabled = true;
    document.getElementById('submitBtn').style.display = 'none';

    fetch('/api/practice/check', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({problem_id: currentProblem.id, user_answer: answer})
    }).then(function(r){return r.json()})
    .then(function(d){
        var area = document.getElementById('resultArea');
        var fb = document.getElementById('resultFeedback');
        var analysis = document.getElementById('resultAnalysis');
        area.style.display = 'block';

        if (d.correct) {
            correctCount++;
            document.getElementById('scoreText').textContent = '✓ ' + correctCount;
            fb.innerHTML = '<span class="text-success fs-5">✓ 正确！</span>';
        } else {
            fb.innerHTML = '<span class="text-danger fs-5">✗ 不正确</span>';
        }
        analysis.innerHTML = '<div class="mt-2 p-2 bg-light rounded">' + (d.analysis || '暂无解析') + '</div>';
        if (window.renderMathInElement) renderMathInElement(analysis, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
        document.getElementById('actionArea').style.display = 'flex';
        currentProblem._wrong = !d.correct;
    });
}

function nextQuestion() {
    if (currentIdx + 1 < problems.length) {
        currentIdx++;
        loadQuestion();
    } else {
        document.getElementById('practiceArea').style.display = 'none';
        document.getElementById('completeArea').style.display = 'block';
        document.getElementById('summaryText').textContent = '共 ' + problems.length + ' 题，正确 ' + correctCount + ' 题，正确率 ' + Math.round(correctCount/problems.length*100) + '%';
    }
}

function addToWrong() {
    fetch('/api/practice/add-wrong', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({problem_id: currentProblem.id, user_answer: document.getElementById('userAnswer').value})
    }).then(function(r){return r.json()})
    .then(function(d){ alert(d.msg || '已加入错题本'); });
}
</script>
{% endblock %}
