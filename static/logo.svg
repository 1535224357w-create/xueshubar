<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d1452"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="70" fill="url(#bg)"/>

  <!-- ∫ 积分号（主要符号） -->
  <text x="200" y="265" font-family="Times New Roman, serif" font-size="200" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">∫</text>

  <!-- dx -->
  <text x="255" y="160" font-family="Times New Roman, serif" font-size="40" font-weight="normal" fill="#ffa040">dx</text>

  <!-- 下标 -->
  <text x="145" y="215" font-family="Times New Roman, serif" font-size="28" fill="#ffa040" opacity="0.7">1</text>
  <text x="145" y="300" font-family="Times New Roman, serif" font-size="28" fill="#ffa040" opacity="0.7">0</text>

  <!-- 底部文字 -->
  <text x="200" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">学数 bar</text>

  <!-- 小标语 -->
  <text x="200" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">AI · 数学 · 学习</text>
</svg>
