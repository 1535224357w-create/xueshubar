<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d1452"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6f00"/>
      <stop offset="100%" style="stop-color:#ffa040"/>
    </linearGradient>
  </defs>

  <!-- 圆角底 -->
  <rect x="20" y="20" width="360" height="360" rx="72" fill="url(#bg)"/>

  <!-- 抽象数学符号组合 -->
  <!-- 积分号 ∫（主体） -->
  <path d="M 200 100 C 175 100, 160 130, 160 200 C 160 270, 175 300, 200 300" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="200" x2="240" y2="200" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- 小圆点装饰 -->
  <circle cx="130" cy="270" r="3" fill="url(#accent)" opacity="0.6"/>
  <circle cx="250" cy="130" r="3" fill="url(#accent)" opacity="0.6"/>
  <circle cx="270" cy="260" r="2" fill="white" opacity="0.3"/>

  <!-- 斜线装饰 -->
  <line x1="255" y1="280" x2="275" y2="300" stroke="white" stroke-width="2" opacity="0.2"/>
  <line x1="140" y1="100" x2="155" y2="115" stroke="white" stroke-width="2" opacity="0.2"/>

  <!-- 品牌文字 -->
  <text x="200" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">学数 bar</text>
  <text x="200" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="3">AI · 数学 · 学习</text>
</svg>
